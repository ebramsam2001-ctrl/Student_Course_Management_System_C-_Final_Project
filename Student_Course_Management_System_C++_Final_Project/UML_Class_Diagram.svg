<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="620" fill="#F8FAFD" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1F3864">UML Class Diagram — Student Course Management System</text>
  <line x1="60" y1="46" x2="840" y2="46" stroke="#2E75B6" stroke-width="2"/>

  <!-- ═══════════════ Person Class ═══════════════ -->
  <g id="person">
    <rect x="60" y="70" width="240" height="170" fill="white" stroke="#1F3864" stroke-width="2" rx="6"/>
    <!-- Header -->
    <rect x="60" y="70" width="240" height="38" fill="#1F3864" rx="6"/>
    <rect x="60" y="96" width="240" height="12" fill="#1F3864"/>
    <text x="180" y="94" text-anchor="middle" font-size="15" font-weight="bold" fill="white">«class»</text>
    <text x="180" y="111" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Person</text>
    <!-- Divider -->
    <line x1="60" y1="120" x2="300" y2="120" stroke="#1F3864" stroke-width="1.5"/>
    <!-- Attributes -->
    <text x="76" y="140" font-size="13" fill="#333">&#x23;  ID : int</text>
    <text x="76" y="158" font-size="13" fill="#333">&#x23;  name : string</text>
    <!-- Divider -->
    <line x1="60" y1="168" x2="300" y2="168" stroke="#CCCCCC" stroke-width="1"/>
    <!-- Methods -->
    <text x="76" y="186" font-size="12" fill="#555">+ Person()</text>
    <text x="76" y="202" font-size="12" fill="#555">+ Person(id: int, name: string)</text>
    <text x="76" y="218" font-size="12" fill="#555">+ getID() : int</text>
    <text x="76" y="234" font-size="12" fill="#555">+ getName() : string</text>
  </g>

  <!-- ═══════════════ Course Class ═══════════════ -->
  <g id="course">
    <rect x="600" y="70" width="260" height="230" fill="white" stroke="#1F3864" stroke-width="2" rx="6"/>
    <!-- Header -->
    <rect x="600" y="70" width="260" height="38" fill="#1F3864" rx="6"/>
    <rect x="600" y="96" width="260" height="12" fill="#1F3864"/>
    <text x="730" y="94" text-anchor="middle" font-size="15" font-weight="bold" fill="white">«class»</text>
    <text x="730" y="111" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Course</text>
    <!-- Divider -->
    <line x1="600" y1="120" x2="860" y2="120" stroke="#1F3864" stroke-width="1.5"/>
    <!-- Attributes -->
    <text x="616" y="140" font-size="13" fill="#333">&#x23;  ID : int</text>
    <text x="616" y="158" font-size="13" fill="#333">&#x23;  name : string</text>
    <text x="616" y="176" font-size="13" fill="#333">&#x23;  credits : int</text>
    <text x="616" y="194" font-size="13" fill="#333">&#x23;  grade : double</text>
    <!-- Divider -->
    <line x1="600" y1="204" x2="860" y2="204" stroke="#CCCCCC" stroke-width="1"/>
    <!-- Methods -->
    <text x="616" y="222" font-size="12" fill="#555">+ Course()</text>
    <text x="616" y="238" font-size="12" fill="#555">+ Course(id, name, credits, grade)</text>
    <text x="616" y="254" font-size="12" fill="#555">+ getID() / setID() : int</text>
    <text x="616" y="270" font-size="12" fill="#555">+ getName() / setName()</text>
    <text x="616" y="286" font-size="12" fill="#555">+ getCredits() / getGrade()</text>
  </g>

  <!-- ═══════════════ Student Class ═══════════════ -->
  <g id="student">
    <rect x="270" y="360" width="320" height="220" fill="white" stroke="#2E75B6" stroke-width="2.5" rx="6"/>
    <!-- Header -->
    <rect x="270" y="360" width="320" height="38" fill="#2E75B6" rx="6"/>
    <rect x="270" y="386" width="320" height="12" fill="#2E75B6"/>
    <text x="430" y="384" text-anchor="middle" font-size="15" font-weight="bold" fill="white">«class»</text>
    <text x="430" y="400" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Student</text>
    <!-- Divider -->
    <line x1="270" y1="410" x2="590" y2="410" stroke="#2E75B6" stroke-width="1.5"/>
    <!-- Attributes -->
    <text x="286" y="430" font-size="13" fill="#333">&#x23;  GPA : double</text>
    <text x="286" y="448" font-size="13" fill="#333">&#x23;  courses : vector&lt;Course&gt;</text>
    <!-- Divider -->
    <line x1="270" y1="460" x2="590" y2="460" stroke="#CCCCCC" stroke-width="1"/>
    <!-- Methods -->
    <text x="286" y="478" font-size="12" fill="#555">+ Student()</text>
    <text x="286" y="494" font-size="12" fill="#555">+ Student(id: int, name: string, gpa: double)</text>
    <text x="286" y="510" font-size="12" fill="#555">+ getGPA() : double</text>
    <text x="286" y="526" font-size="12" fill="#555">+ setGPA(gpa: double)</text>
    <text x="286" y="542" font-size="12" fill="#555">+ enrollInCourse(course: Course)</text>
    <text x="286" y="558" font-size="12" fill="#555">+ getCourses() : vector&lt;Course&gt;</text>
  </g>

  <!-- ═══ Inheritance arrow: Person ← Student (hollow triangle) ═══ -->
  <!-- Line from Student top-center up to Person bottom-center -->
  <line x1="430" y1="360" x2="430" y2="300" stroke="#1F3864" stroke-width="2"/>
  <line x1="430" y1="300" x2="180" y2="300" stroke="#1F3864" stroke-width="2"/>
  <line x1="180" y1="300" x2="180" y2="240" stroke="#1F3864" stroke-width="2"/>
  <!-- Hollow triangle at Person end -->
  <polygon points="180,240 170,258 190,258" fill="white" stroke="#1F3864" stroke-width="2"/>
  <!-- Label -->
  <rect x="230" y="288" width="120" height="22" fill="#EEF4FB" rx="4"/>
  <text x="290" y="303" text-anchor="middle" font-size="12" fill="#1F3864" font-style="italic">«extends»</text>

  <!-- ═══ Composition arrow: Student ◆— Course ═══ -->
  <!-- Line from Student right-center to Course bottom-left -->
  <line x1="590" y1="470" x2="660" y2="470" stroke="#1F3864" stroke-width="2"/>
  <line x1="660" y1="470" x2="660" y2="300" stroke="#1F3864" stroke-width="2"/>
  <!-- Diamond at Student end -->
  <polygon points="590,470 606,460 622,470 606,480" fill="#1F3864" stroke="#1F3864" stroke-width="1.5"/>
  <!-- Arrow at Course end -->
  <polygon points="660,300 651,316 669,316" fill="#1F3864"/>
  <!-- Label -->
  <rect x="668" y="370" width="110" height="22" fill="#EEF4FB" rx="4"/>
  <text x="723" y="385" text-anchor="middle" font-size="12" fill="#1F3864">1  *</text>
  <rect x="668" y="394" width="110" height="22" fill="#EEF4FB" rx="4"/>
  <text x="723" y="409" text-anchor="middle" font-size="12" fill="#1F3864" font-style="italic">«composition»</text>

  <!-- ═══ Legend ═══ -->
  <rect x="60" y="530" width="480" height="75" fill="white" stroke="#CCCCCC" stroke-width="1" rx="6"/>
  <text x="80" y="550" font-size="13" font-weight="bold" fill="#1F3864">Legend</text>
  <line x1="80" y1="560" x2="520" y2="560" stroke="#CCCCCC" stroke-width="1"/>
  <!-- Inheritance symbol -->
  <line x1="90" y1="575" x2="130" y2="575" stroke="#1F3864" stroke-width="2"/>
  <polygon points="130,575 120,569 120,581" fill="white" stroke="#1F3864" stroke-width="1.5"/>
  <text x="140" y="579" font-size="12" fill="#333">Inheritance (extends)</text>
  <!-- Composition symbol -->
  <line x1="290" y1="575" x2="340" y2="575" stroke="#1F3864" stroke-width="2"/>
  <polygon points="290,575 303,569 316,575 303,581" fill="#1F3864" stroke="#1F3864"/>
  <text x="350" y="579" font-size="12" fill="#333">Composition (has-a)</text>
  <!-- visibility -->
  <text x="90" y="598" font-size="12" fill="#333"># = protected</text>
  <text x="220" y="598" font-size="12" fill="#333">+ = public</text>
  <text x="320" y="598" font-size="12" fill="#333">- = private</text>
</svg>
